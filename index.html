<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d1117">
<title>Bilici TMP</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:#0d1117;color:#e6edf3;font-family:'Segoe UI',Arial,sans-serif;display:flex;align-items:center;justify-content:center;}
.wrap{text-align:center;padding:20px;}
.logo{font-size:32px;font-weight:900;letter-spacing:1px;margin-bottom:8px;}
.logo span{color:#388bfd;}
.sub{font-size:14px;color:#8b949e;margin-bottom:32px;}
.spinner{width:40px;height:40px;border:3px solid #30363d;border-top-color:#3fb950;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg)}}
.msg{font-size:14px;color:#8b949e;}
.btns{display:flex;gap:12px;justify-content:center;margin-top:24px;}
.btn{padding:12px 24px;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-block;}
.btn-m{background:#2ea043;color:#fff;}
.btn-d{background:#1f6feb;color:#fff;}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">&#x1F69B; <span>BILICI</span> TMP</div>
  <div class="sub">Gestionale Magazzino</div>
  <div class="spinner" id="spinner"></div>
  <div class="msg" id="msg">Rilevamento dispositivo in corso...</div>
  <div class="btns" id="btns" style="display:none;">
    <a class="btn btn-m" href="/mobile.html">&#x1F4F1; Mobile</a>
    <a class="btn btn-d" href="/desktop.html">&#x1F4BB; Desktop</a>
  </div>
</div>
<script>
function isDesktop() {
  var w = window.innerWidth;
  var ua = navigator.userAgent;
  var isMobileUA = /Mobi|Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(ua);
  return w >= 960 && !isMobileUA;
}

function redirect() {
  var desktop = isDesktop();
  var target = desktop ? '/desktop.html' : '/mobile.html';
  var label = desktop ? 'Desktop' : 'Mobile';
  document.getElementById('msg').textContent = 'Apertura versione ' + label + '...';
  setTimeout(function() {
    window.location.replace(target);
  }, 800);
}

// Avvia redirect dopo un breve delay
setTimeout(redirect, 600);

// Se dopo 4 secondi non e ancora partito, mostra i bottoni manuali
setTimeout(function() {
  if (document.getElementById('spinner')) {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('msg').textContent = 'Scegli la versione:';
    document.getElementById('btns').style.display = 'flex';
  }
}, 4000);
</script>
</body>
</html>
