<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d1117">
<title>Bilici TMP</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:#0d1117;color:#e6edf3;font-family:'Barlow',Arial,sans-serif;display:flex;align-items:center;justify-content:center;padding:24px;}
.wrap{width:100%;max-width:420px;display:flex;flex-direction:column;align-items:center;}
.logo{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;letter-spacing:2px;margin-bottom:6px;text-align:center;}
.logo span{color:#388bfd;}
.sub{font-size:13px;color:#8b949e;margin-bottom:36px;text-align:center;}
.tab-grid{width:100%;display:flex;flex-direction:column;gap:14px;}
.tab-btn{width:100%;padding:28px 24px;border:none;border-radius:14px;cursor:pointer;display:flex;align-items:center;gap:20px;text-align:left;transition:transform .12s,opacity .12s;position:relative;overflow:hidden;}
.tab-btn:active{transform:scale(.97);opacity:.88;}
.tab-org{background:linear-gradient(135deg,#1f6feb,#1657c9);box-shadow:0 4px 24px rgba(31,111,235,.25);}
.tab-op{background:linear-gradient(135deg,#2ea043,#26893a);box-shadow:0 4px 24px rgba(46,160,67,.25);}
.tab-icon{font-size:42px;flex-shrink:0;line-height:1;}
.tab-text{flex:1;}
.tab-title{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:900;color:#fff;letter-spacing:1px;line-height:1.1;margin-bottom:4px;}
.tab-desc{font-size:13px;color:rgba(255,255,255,.7);line-height:1.4;}
.tab-arrow{font-size:22px;color:rgba(255,255,255,.5);flex-shrink:0;}
.tab-btn::after{content:'';position:absolute;top:0;left:-60%;width:40%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent);transform:skewX(-15deg);transition:left .5s;}
.tab-btn:hover::after{left:120%;}
.divider{width:100%;display:flex;align-items:center;gap:12px;color:#444c56;font-size:12px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;margin:2px 0;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#30363d;}
.loading{position:fixed;inset:0;background:#0d1117;display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:100;}
.spinner{width:36px;height:36px;border:3px solid #30363d;border-top-color:#3fb950;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-msg{font-size:14px;color:#8b949e;}
</style>
</head>
<body>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <div class="loading-msg" id="loading-msg">Apertura in corso...</div>
</div>

<div class="wrap" id="wrap">
  <div class="logo">&#x1F69B; <span>BILICI</span> TMP</div>
  <div class="sub">Gestionale Magazzino</div>
  <div class="tab-grid">

    <button class="tab-btn tab-org" onclick="goOrganizzatori()">
      <span class="tab-icon">&#x1F4BB;</span>
      <div class="tab-text">
        <div class="tab-title">ORGANIZZATORI</div>
        <div class="tab-desc">Accesso completo al gestionale.<br>Admin, Plus e supervisori.</div>
      </div>
      <span class="tab-arrow">&#x276F;</span>
    </button>

    <div class="divider">oppure</div>

    <button class="tab-btn tab-op" onclick="goOperatori()">
      <span class="tab-icon">&#x1F464;</span>
      <div class="tab-text">
        <div class="tab-title">OPERATORI</div>
        <div class="tab-desc">Entrata, uscita, trasferimenti.<br>Accesso con qualsiasi credenziale.</div>
      </div>
      <span class="tab-arrow">&#x276F;</span>
    </button>

  </div>
</div>

<script>
function isDesktop() {
  var ua = navigator.userAgent;
  return window.innerWidth >= 960 && !/Mobi|Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(ua);
}
function showLoading(msg) {
  document.getElementById('loading-msg').textContent = msg;
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('wrap').style.opacity = '0.3';
  document.getElementById('wrap').style.pointerEvents = 'none';
}
function goOrganizzatori() {
  var target = isDesktop() ? '/desktop.html' : '/mobile.html';
  showLoading('Apertura ' + (isDesktop() ? 'versione Desktop' : 'versione Mobile') + '...');
  setTimeout(function() { window.location.href = target; }, 500);
}
function goOperatori() {
  showLoading('Apertura area Operatori...');
  setTimeout(function() { window.location.href = '/operatore.html'; }, 500);
}
</script>
</body>
</html>
