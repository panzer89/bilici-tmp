<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0d1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bilici TMP">
<link rel="apple-touch-icon" href="icon.png">
<link rel="manifest" href="manifest.json">
<title>Bilici TMP</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Segoe UI',sans-serif;background:#0d1117;color:#e6edf3;display:flex;align-items:center;justify-content:center;padding:24px;}
.wrap{width:100%;max-width:400px;}
.logo{font-size:28px;font-weight:900;text-align:center;margin-bottom:6px;letter-spacing:1px;}
.logo span{color:#388bfd;}
.sub{font-size:13px;color:#8b949e;text-align:center;margin-bottom:32px;}
.btn{display:flex;align-items:center;gap:14px;padding:18px 20px;background:#161b22;border:1px solid #30363d;border-radius:14px;text-decoration:none;color:#e6edf3;margin-bottom:12px;transition:all .15s;}
.btn:hover{border-color:#388bfd;background:#1e2730;}
.btn .ic{font-size:32px;flex-shrink:0;}
.btn .info .title{font-size:16px;font-weight:700;margin-bottom:3px;}
.btn .info .desc{font-size:12px;color:#8b949e;}
.btn .arr{margin-left:auto;color:#444c56;font-size:18px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">🚛 <span>BILICI</span> TMP</div>
  <div class="sub">Seleziona la tua area di accesso</div>

  <a href="desktop.html" class="btn">
    <span class="ic">🖥️</span>
    <div class="info">
      <div class="title">Gestione Desktop</div>
      <div class="desc">Admin e Plus — PC e tablet</div>
    </div>
    <span class="arr">›</span>
  </a>

  <a href="gestione.html" class="btn">
    <span class="ic">📱</span>
    <div class="info">
      <div class="title">Gestione Mobile</div>
      <div class="desc">Admin e Plus — smartphone</div>
    </div>
    <span class="arr">›</span>
  </a>

  <a href="operatore.html" class="btn">
    <span class="ic">👷</span>
    <div class="info">
      <div class="title">Operatore</div>
      <div class="desc">Area operativa — smartphone</div>
    </div>
    <span class="arr">›</span>
  </a>
</div>
</body>
</html>
